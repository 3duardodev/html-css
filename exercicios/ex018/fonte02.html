<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        /* Tipos de format():
        -> opentype (otf)
        -> truetype (ttf)
        -> embedded-opentype
        -> truetype-aat (Apple Advanced Typography)
        -> svg
        */
        @font-face {
            font-family: 'London';
            src: url('fonts/Olondon_.otf') format('opentype'), url('fonts/OldLondon.ttf') format('truetype');
        }
        @font-face {
            font-family: 'Love';
            src: url('fonts/love larry ttf.ttf') format('truetype');
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        h1 {
            font-family: 'London', Times, serif;
            font-size: 3em;
            font-weight: normal;
        }

        p {
            font-family: 'Love', Times, serif;
        }
    </style>
</head>
<body>
    <h1>Título 1</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Aliquam dignissimos doloribus ab exercitationem quae ipsa! Laborum atque numquam ipsum quia, pariatur autem et architecto, blanditiis sapiente nesciunt impedit placeat quam?</p>
</body>
</html>
