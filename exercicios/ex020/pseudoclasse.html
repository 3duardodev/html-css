<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-Classes</title>
    <style>
        div {
            background-color: lightgray;
            border: 1px solid black;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            width: 200px;
            height: 200px;
            display: inline-block;
            /*display: inline-block; serve para deixar os elementos na horizontal*/
        }

        div:hover {
            background-color: red;
            color: blueviolet;
        }

        div#d1 {
            border: 5px solid black;
        }

    </style>
</head>
<body>
    <div id="d1">01</div>
    <div id="d2">02</div>
    <div id="d3">03</div>
</body>
</html>
